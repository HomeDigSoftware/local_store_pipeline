version: 2

models:
  - name: int_sales__line_items
    description: "Reusable sales line model that standardizes one row per sold item line from staged document headers, lines, and payment context."
    columns:
      - name: document_id
        description: "Transaction document identifier."
        data_tests:
          - not_null
      - name: receipt_datetime
        description: "Timestamp of the transaction built in the document staging layer."
      - name: receipt_date
        description: "Business date of the sale."
        data_tests:
          - not_null
      - name: item_id
        description: "Product identifier sold on the line."
        data_tests:
          - not_null
      - name: item_name
        description: "Product description captured on the transaction line."
      - name: quantity
        description: "Net quantity on the sales line."
      - name: line_total_inc_vat
        description: "Line-level sales amount including VAT."
      - name: receipt_total_inc_vat
        description: "Full receipt total including VAT from the document header."
      - name: payment_type
        description: "Payment type selected from the receipt payment context."
      - name: is_credit
        description: "Flag indicating whether the payment was credit."
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: credit_card_type
        description: "Credit card type code when available."
      - name: is_return
        description: "Flag indicating whether the document total is negative."
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: source_sequence
        description: "Technical source sequence carried from the document header."

  - name: int_sales__daily_product
    description: "Daily product sales aggregation built from int_sales__line_items for inventory, demand, and reporting models."
    columns:
      - name: sale_date
        description: "Date of the product sales aggregation."
        data_tests:
          - not_null
      - name: item_id
        description: "Product identifier."
        data_tests:
          - not_null
      - name: sold_qty
        description: "Quantity sold for the product on the day."
      - name: net_sales_amount
        description: "Net sales amount for the product on the day."
      - name: return_qty
        description: "Quantity associated with lines flagged as returns."
      - name: tickets_count
        description: "Distinct document count contributing to the daily product total."

  - name: int_sales__daily_store
    description: "Daily store-level sales summary built from int_sales__line_items for operational and executive reporting."
    columns:
      - name: sale_date
        description: "Date of the store sales aggregation."
        data_tests:
          - not_null
      - name: total_sales_amount
        description: "Total sales amount for the day."
      - name: total_units_sold
        description: "Total units sold for the day."
      - name: ticket_count
        description: "Number of transactions for the day."

  - name: int_sales__returns
    description: "Planned returns-focused model that isolates return behavior for downstream net sales logic."
    columns:
      - name: document_id
        description: "Return document identifier."
        data_tests:
          - not_null
      - name: item_id
        description: "Returned product identifier."
        data_tests:
          - not_null
      - name: return_qty
        description: "Quantity returned for the product."
      - name: return_amount
        description: "Amount associated with the return."
