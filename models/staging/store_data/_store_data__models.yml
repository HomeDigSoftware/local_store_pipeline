version: 2

models:

  - name: stg_fact_inventory
    description: "Current staging model that enriches inventory balances with product attributes and category information."
    columns:
      - name: item_id
        description: "Product identifier in the inventory snapshot."
        data_tests:
          - not_null
      - name: inventorybalance
        description: "Current source inventory balance."
      - name: itemdesc
        description: "Product description joined from the items table."
      - name: category
        description: "Readable product category from the item type reference."
      - name: sale_price
        description: "Current sale price from the product master."
      - name: cost
        description: "Unit cost from the product master."

  - name: stg_items
    description: "Current product staging model that passes through item attributes from the raw items table."
    columns:
      - name: item_id
        description: "Product identifier."
        data_tests:
          - not_null
          - unique
      - name: dbt_loaded_at
        description: "Timestamp when the row was loaded by dbt."
        data_tests:
          - not_null
      - name: dbt_source_relation
        description: "Technical column documenting the model lineage."

  - name: stg_fact_attendance_event
    description: "Current attendance staging model that converts raw punch fields into usable timestamps and event attributes."
    columns:
      - name: attendancedate
        description: "Date of the attendance event."
        data_tests:
          - not_null
      - name: attendancedatetime
        description: "Timestamp of the attendance event."
        data_tests:
          - not_null
      - name: emplyee_id
        description: "Employee identifier on the attendance event."
        data_tests:
          - not_null
      - name: movementtype
        description: "Attendance movement code."

  - name: stg_store_data__documents
    description: "Source-aligned staging model for sales document headers with standardized date, time, and amount fields."
    columns:
      - name: document_id
        description: "Transaction document identifier from the POS source."
        data_tests:
          - not_null
      - name: receipt_date
        description: "Business date on which the document was recorded."
        data_tests:
          - not_null
      - name: receipt_datetime
        description: "Timestamp built from the document date and the source print time in seconds."
      - name: receipt_time
        description: "Formatted document time as HH24:MI:SS."
      - name: document_type
        description: "Raw source document type code."
      - name: total_amount_inc_vat
        description: "Document total including VAT."
      - name: source_sequence
        description: "Technical source sequence used for lineage and ordering."

  - name: stg_store_data__document_lines
    description: "Source-aligned staging model for sales document line items with standardized product, quantity, and amount fields."
    columns:
      - name: document_id
        description: "Transaction document identifier linking the line to its header."
        data_tests:
          - not_null
      - name: item_id
        description: "Product identifier sold on the line item."
        data_tests:
          - not_null
      - name: item_name
        description: "Raw product description captured on the transaction line."
      - name: quantity
        description: "Sold quantity recorded on the transaction line."
      - name: line_total_inc_vat
        description: "Line total amount including VAT."

  - name: stg_store_data__receipt_lines
    description: "Source-aligned staging model for receipt payment lines with standardized payment attributes."
    columns:
      - name: document_id
        description: "Transaction document identifier linking the payment row to the document header."
        data_tests:
          - not_null
      - name: payment_type
        description: "Raw source payment type code."
      - name: is_credit
        description: "Flag indicating whether the payment type is credit based on the source payment code."
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: credit_card_type
        description: "Raw source credit card type code when present."
      - name: account_number_moreinfo
        description: "Raw account or settlement indicator retained for downstream filtering and payment logic."

  - name: stg_store_data__items
    description: "Source-aligned staging model for the items master table with standardized naming and unit economics fields."
    columns:
      - name: item_id
        description: "Product identifier from the source system."
        data_tests:
          - not_null
          - unique
      - name: item_name
        description: "Readable product description from the item master."
      - name: item_type_id
        description: "Product type identifier from the source item master."
      - name: cost_per_unit
        description: "Unit cost excluding VAT from the source item master."
      - name: cost_per_unit_inc_vat
        description: "Unit cost including VAT based on the current source calculation."
      - name: sale_price
        description: "Unit sale price from the source item master."
      - name: profit_per_unit_inc_vat
        description: "Unit sale price minus unit cost including VAT."

  - name: stg_store_data__inventory
    description: "Source-aligned staging model for the current inventory snapshot with standardized quantity, category, and unit economics fields."
    columns:
      - name: item_id
        description: "Product identifier in the current inventory snapshot."
        data_tests:
          - not_null
      - name: opening_inventory_qty
        description: "Opening stock quantity from the source inventory snapshot."
      - name: inventory_balance_qty
        description: "Current inventory balance quantity from the source system."
      - name: counted_inventory_qty
        description: "Counted inventory quantity from the source snapshot when available."
      - name: product_category_id
        description: "Product category identifier from the item master."
      - name: product_category_name
        description: "Readable product category name from the item type reference."
      - name: item_name
        description: "Readable product description from the item master."
      - name: unit_cost
        description: "Unit cost excluding VAT from the item master."
      - name: unit_cost_inc_vat
        description: "Unit cost including VAT based on the current source calculation."
      - name: unit_sale_price
        description: "Unit sale price from the item master."
      - name: profit_per_unit_inc_vat
        description: "Unit sale price minus unit cost including VAT."

  - name: stg_store_data__attendance_events
    description: "Source-aligned staging model for attendance events with standardized employee, date, time, and recording fields."
    columns:
      - name: employee_id
        description: "Employee identifier from the attendance source system."
        data_tests:
          - not_null
      - name: employee_name
        description: "Readable employee name from the employee reference table when available."
      - name: attendance_date
        description: "Attendance event date from the source record."
        data_tests:
          - not_null
      - name: attendance_time
        description: "Attendance event time built from seconds since midnight."
      - name: attendance_datetime
        description: "Full attendance timestamp built from the event date and hourtime fields."
        data_tests:
          - not_null
      - name: movement_type
        description: "Raw attendance movement code such as in, out, or correction."
      - name: recording_type
        description: "Attendance recording type from the source system."
      - name: source_sequence
        description: "Technical source sequence used for lineage and ordering."

  - name: stg_store_data__employees
    description: "Source-aligned staging model for employee reference data with standardized identifier and name fields."
    columns:
      - name: employee_id
        description: "Employee identifier from the source employee reference table."
        data_tests:
          - not_null
      - name: employee_name
        description: "Readable employee name from the source employee reference table."

  - name: stg_store_data__item_types
    description: "Source-aligned staging model for item type reference data with standardized identifier and name fields."
    columns:
      - name: item_type_id
        description: "Product type identifier from the source reference table."
        data_tests:
          - not_null
      - name: item_type_name
        description: "Readable product type description from the source reference table."
